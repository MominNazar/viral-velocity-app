# Render Blueprint — API + optional admin (or deploy admin on Vercel)
services:
  - type: web
    name: viral-velocity-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENHANCE_ENGINE
        value: sharp
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: PUBLIC_BASE_URL
        value: https://viral-velocity-app.onrender.com

  - type: web
    name: viral-velocity-admin
    runtime: static
    rootDir: admin-web
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://viral-velocity-app.onrender.com
      - key: NODE_VERSION
        value: "22"
