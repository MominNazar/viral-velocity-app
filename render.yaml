# Render Blueprint — deploy backend from GitHub
# Dashboard: New > Blueprint > connect repo (uses this file)
services:
  - type: web
    name: viral-velocity-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENHANCE_ENGINE
        value: sharp
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: PUBLIC_BASE_URL
        value: https://viral-velocity-app.onrender.com
