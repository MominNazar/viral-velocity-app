# Render Blueprint — API + admin
# IMPORTANT: Free web services have an EPHEMERAL disk — data resets when the
# instance sleeps. For durable data either:
#   A) Attach a persistent disk (Starter plan+) with DATA_DIR=/var/data
#   B) Set UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN (free Upstash Redis)
services:
  - type: web
    name: viral-velocity-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENHANCE_ENGINE
        value: sharp
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: PUBLIC_BASE_URL
        value: https://viral-velocity-app.onrender.com
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  - type: web
    name: viral-velocity-admin
    runtime: static
    rootDir: admin-web
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://viral-velocity-app.onrender.com
      - key: NODE_VERSION
        value: "22"
